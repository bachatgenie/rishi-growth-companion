<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - पालक डॅशबोर्ड</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a3e 0%, #2d2d5a 100%);
            min-height: 100vh;
            color: #333;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-box h1 {
            color: #764ba2;
            margin-bottom: 10px;
        }

        .login-box .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #ff6b6b;
            margin-top: 15px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>👨 Parent Login</h1>
            <p class="subtitle">पालक लॉगिन</p>
            
            <div class="form-group">
                <label>Password / पासवर्ड</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            
            <button class="login-btn" onclick="login()">Login / लॉगिन</button>
            
            <p class="error" id="errorMsg">Invalid password! / चुकीचा पासवर्ड!</p>
            
            <div class="back-link">
                <a href="/child">← Back to Child Login / मुलाच्या लॉगिनकडे परत जा</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function login() {
            const password = document.getElementById('password').value;
            
            if (!password) {
                document.getElementById('errorMsg').classList.add('show');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/auth/parent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.href = '/parent/dashboard.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = 'Connection error. Please try again.';
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
